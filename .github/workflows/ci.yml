name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agents:
    name: Agents (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agents/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            agents/package-lock.json

      - name: Install agents (prebuild dependency)
        working-directory: agents
        run: npm ci

      - name: Build agents
        working-directory: agents
        run: npm run build

      - name: Install frontend
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://casperagent.xyz
          NEXT_PUBLIC_CASPER_CHAIN_NAME: casper-test
          NEXT_PUBLIC_CASPER_RPC_URL: https://node.testnet.casper.network/rpc
          NEXT_PUBLIC_CSPR_CLICK_APP_ID: csprclick-template
          NEXT_PUBLIC_ESCROW_PACKAGE_HASH: hash-75e9a98ffc98b9e7661a40f7a2ce0dfb382c1dd156bc3781c8b187310e5809cb
          NEXT_PUBLIC_ATTESTATION_PACKAGE_HASH: hash-25825b6d3e456ecc37eb77a15eecd8369dbfdf33c55aaf744f1a0007fe37db95
        run: npm run build

  contracts:
    name: Contracts (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/agentvault-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          # Channel only (no host triple) — Linux CI cannot use windows-gnu toolchain file targets.
          toolchain: nightly-2026-01-01
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/agentvault-core

      - name: Test
        # Prefer host default target; rust-toolchain is channel-only.
        run: cargo test
